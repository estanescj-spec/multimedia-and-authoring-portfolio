<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multimedia & Authoring</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #6b6b6b;
      --accent: #1a56db;
      --border: #e8e8e8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 60px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .logo {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 36px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    /* HERO */
    .hero {
      padding: 140px 60px;
      max-width: 800px;
    }

    .hero-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--muted);
      font-weight: 300;
    }

    .hero-desc {
      font-size: 17px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
      max-width: 520px;
    }

    /* MOBILE */
    @media (max-width: 700px) {
      nav { padding: 18px 24px; }
      .hero { padding: 100px 24px; }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="logo">Multimedia <span>&</span> Authoring</a>
    <div class="nav-links">
      <a href="solar-system.html">Solar System</a>
      <a href="rotoscope.html">Rotoscope</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <section class="hero">
    <p class="hero-label">CHARLIE ESTANES JR. — BSIT - S - 2A</p>
    <h1>Multimedia <em>&</em> Authoring</h1>
    <p class="hero-desc">
      A portfolio of multimedia projects covering 3D animation in Blender and frame-by-frame rotoscope work. Built for academic documentation and presentation.
    </p>
  </section>

</body>
</html>
