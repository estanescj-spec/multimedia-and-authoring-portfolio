<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia and Authoring</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .nav-links {
      display: flex;
      gap: 25px;
    }

    .nav-links a {
      text-decoration: none;
      color: #cbd5f5;
      font-size: 14px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #38bdf8;
    }

    /* HERO */
    .hero {
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
      font-size: 18px;
    }

    /* BUTTON */
    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 20px;
      background: #38bdf8;
      color: #020617;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #64748b;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">Multimedia and Authoring</div>
    <div class="nav-links">
      <a href="#">Solar System</a>
      <a href="#">Rotoscope</a>
      <a href="#">About</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div>
      <h1>Welcome</h1>
      <p>Explore interactive projects in multimedia and authoring</p>
      <a href="#" class="btn">Get Started</a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Multimedia and Authoring
  </footer>

</body>
</html>
